; MKS ESP32 FOC V2.0 — open-loop velocity bring-up
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; Pin SimpleFOC to the version the examples were written for (2.2.1)
lib_deps =
    https://github.com/simplefoc/Arduino-FOC.git#v2.2.1
