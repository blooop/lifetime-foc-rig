; MKS ESP32 FOC V2.0 — open-loop velocity bring-up
[platformio]
; `pio run` / `pixi run build|flash` target the board only — the native test env
; has no firmware program, so it must not be in the default build set.
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; Pin SimpleFOC to the version the examples were written for (2.2.1)
lib_deps =
    https://github.com/simplefoc/Arduino-FOC.git#v2.2.1

; Host (desktop) env for unit-testing the pure safety/motion math in
; src/control_logic.h with `pio test -e native` (`pixi run test-fw`).
; main.cpp (Arduino/SimpleFOC) is NOT compiled here — test_build_src stays off
; (the default), so only the test files + the header are built.
[env:native]
platform = native
build_flags = -std=gnu++11 -I src
test_framework = unity
