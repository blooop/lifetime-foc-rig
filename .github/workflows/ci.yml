name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests (panel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # System libs the conda-forge Qt offscreen platform plugin dlopens.
      - name: Install Qt offscreen runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          frozen: true          # use the committed pixi.lock (reproducible)

      - name: Run pytest suite
        run: pixi run test

  firmware:
    name: Firmware (native tests + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          frozen: true

      # PlatformIO downloads toolchains/platforms; cache them between runs.
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Native unit tests (safety logic)
        run: pixi run test-fw

      - name: Compile firmware for the board
        run: pixi run build
